<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="order.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/JejuGothic/JejuGothic.css" type="text/css"/>
    <script src="order.js" defer></script>
    <title>Экскурсия на производство мебели | Запись на посещение</title>
</head>
<body>
    <header>
        <div class="center_block">
            <div class="content_header">
                <div class="navigation">
                    <a href="../main/main.html">Главная</a>
                    <a href="../catalog/catalog.html">Каталог</a>
                    <a href="../order/order.html">Экскурсия</a>
                    <a href="../reviews/reviews.html">Отзывы</a>
                    <a href="../contacts/contacts.html">Контакты</a>
                </div>

                <div class="auth_links">
                    <a href="../auth/login.html" id="loginLink" class="nav-link">Вход</a>
                    <a href="../auth/register.html" id="registerLink" class="nav-link">Регистрация</a>
                    <a href="../profile/profile.html" id="profileLink" class="nav-link">Профиль</a>
                    <a href="../admin/admin.html" id="adminLink" class="nav-link">Админ</a>
                    <a href="#" id="logoutBtn" class="nav-link">Выход</a>
                </div>
<script>
  fetch('/api/auth/me').then(r => r.json()).then(data => {
    const user = data.user;

    const loginLink = document.getElementById('loginLink');
    const registerLink = document.getElementById('registerLink');
    const profileLink = document.getElementById('profileLink');
    const adminLink = document.getElementById('adminLink');
    const logoutBtn = document.getElementById('logoutBtn');

    if (!user) {
      profileLink.style.display = 'none';
      adminLink.style.display = 'none';
      logoutBtn.style.display = 'none';
      return;
    }

    loginLink.style.display = 'none';
    registerLink.style.display = 'none';

    if (user.role !== 'admin') {
      adminLink.style.display = 'none';
    }

    logoutBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      location.href = '/main/main.html';
    });
  });
</script>
            </div>
        </div>
    </header>
    <div class="content">
        <div class="information">
            <div class="textOrder"></div>
        </div>
        <div class="center_block">
            <div class="formOrder">
                <div class="headingOrder"><p>ОСТАВЬТЕ СВОЮ ЗАЯВКУ ДЛЯ ОБРАЩЕНИЯ</p></div>
                <div class="orderForm">
                    <input id="fullName" placeholder="ФИО (обязательно)">
                    <input id="phone" placeholder="Телефон: 89991234567 (обязательно)">

                    <label class="field-label" for="requestType">Тип заявки*</label>
                    <select id="requestType">
                        <option value="">Выберите тип заявки</option>
                        <option value="excursion">На экскурсию</option>
                        <option value="measurement">На замеры</option>
                        <option value="other">Другое</option>
                    </select>

                    <div id="customTypeBlock" class="custom-type-block">
                        <label class="field-label" for="customType">Название заявки*</label>
                        <input id="customType" placeholder="Например: консультация по кухне">
                    </div>

                    <textarea id="comment" placeholder="Комментарий (необязательно)"></textarea>

                    <button id="sendReq">Отправить обращение</button>

                    <p id="msg" class="form-message"></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
