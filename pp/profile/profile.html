<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="profile.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/JejuGothic/JejuGothic.css" type="text/css"/>

  <script src="profile.js" defer></script>

  <title>Профиль пользователя</title>
</head>
<body>

  <header>
    <div class="center_block">
      <div class="content_header">
        <div class="navigation">
          <a href="../main/main.html">Главная</a>
          <a href="../catalog/catalog.html">Каталог</a>
          <a href="../order/order.html">Экскурсия</a>
          <a href="../reviews/reviews.html">Отзывы</a>
          <a href="../contacts/contacts.html">Контакты</a>
        </div>

        <div class="auth_links">
          <a href="../admin/admin.html" id="adminLink">Админ</a>
          <a href="#" id="logoutBtn">Выход</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="center_block">

      <h1>Личный кабинет</h1>

      <p id="msg"></p>

      <div class="tabs">
        <button class="tab-btn active" data-tab="accountTab">Данные аккаунта</button>
        <button class="tab-btn" data-tab="securityTab">Безопасность</button>
        <button class="tab-btn" data-tab="requestsTab">Мои обращения</button>
        <button class="tab-btn" data-tab="ordersTab">История заказов</button>
        <button class="tab-btn" data-tab="reviewTab">Отзыв</button>
      </div>

      <section id="accountTab" class="profile-tab-panel active">
        <h2>Данные аккаунта</h2>

        <p>
          Логин:
          <b id="loginText">Загрузка...</b>
        </p>
      </section>

      <section id="securityTab" class="profile-tab-panel">
        <h2>Безопасность</h2>

        <div>
          <input id="newPassword" type="password" placeholder="Новый пароль">
          <button id="changePasswordBtn">Изменить пароль</button>
        </div>

        <p id="passwordMsg"></p>
      </section>

      <section id="requestsTab" class="profile-tab-panel">
        <h2>Мои обращения</h2>

        <p id="requestsMsg"></p>

        <div id="requestsList">
          Загрузка обращений...
        </div>
      </section>

      <section id="ordersTab" class="profile-tab-panel">
        <h2>История заказов</h2>

        <div id="ordersList">
          Загрузка истории заказов...
        </div>
      </section>

      <section id="reviewTab" class="profile-tab-panel">
        <h2>Мой отзыв</h2>

        <div>
          <p>Оценка:</p>

          <label>1 <input type="radio" name="rating" value="1"></label>
          <label>2 <input type="radio" name="rating" value="2"></label>
          <label>3 <input type="radio" name="rating" value="3"></label>
          <label>4 <input type="radio" name="rating" value="4"></label>
          <label>5 <input type="radio" name="rating" value="5"></label>
        </div>

        <div>
          <textarea id="reviewComment" placeholder="Комментарий к отзыву"></textarea>
        </div>

        <button id="saveReviewBtn">Сохранить отзыв</button>

        <p id="reviewMsg"></p>
      </section>

    </div>
  </main>

</body>
</html>
